name: Build and Release

on:
  push:
    tags:
      - "v*"

# Needed so the final step can commit control.json back to the repo
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Tag pushes checkout in detached HEAD state; we need main as a
          # real branch ref so we can commit control.json back to it later.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"          # e.g. v1.3.0
          VERSION="${TAG#v}"                       # e.g. 1.3.0
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build LinkHarvest.exe
        run: |
          pyinstaller --onefile --windowed --icon=assets/icon.ico --name LinkHarvest app.py

      - name: Create GitHub Release and upload exe
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          files: dist/LinkHarvest.exe
          generate_release_notes: true

      - name: Checkout main branch for commit
        shell: bash
        run: |
          git fetch origin main
          git checkout main

      # --- Auto lock-out step -------------------------------------------
      # After a successful build + release, bump control.json's
      # min_version to this release's version and commit it straight to
      # main. Every older running copy of the app will fail its startup
      # check on next launch and be forced to update.
      - name: Update control.json to enforce new minimum version
        shell: bash
        run: |
          python - <<'PY'
          import json, os

          version = "${{ steps.version.outputs.version }}"
          path = "control.json"

          if os.path.exists(path):
              with open(path) as f:
                  data = json.load(f)
          else:
              data = {}

          data["active"] = True
          data["min_version"] = version
          data["message"] = (
              f"A required update (v{version}+) is available. "
              "Please download the latest version from GitHub Releases."
          )

          with open(path, "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PY

      - name: Commit and push control.json
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add control.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump min_version to ${{ steps.version.outputs.version }} [skip ci]"
            git push origin main
          else
            echo "control.json already up to date, nothing to commit."
          fi
